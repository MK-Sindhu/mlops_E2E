# Prometheus Configuration
# Scrapes metrics from the FastAPI fraud detection API
# Guideline: Configure Prometheus/Grafana to trigger alerts if error rates exceed 5%

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "fraud-detection-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "fraud-detection"

  # Host CPU/RAM/disk/network — added in Phase 12
  - job_name: "node-exporter"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: "host"
