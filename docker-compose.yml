# Docker Compose: Multi-container deployment
# Guideline: Use docker-compose for multi-container setup:
#   one for API, one for model server, one for monitoring.

version: "3.8"

services:
  # ── FastAPI Prediction Service ──────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/best_model.joblib
      - FEATURES_PATH=models/feature_names.json
      - SCALER_PATH=data/processed/scaler.joblib
    volumes:
      - ./models:/app/models
      - ./data/processed:/app/data/processed
      - ./data/baselines:/app/data/baselines
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fraud-net

  # ── MLflow Tracking Server ─────────────────────────
  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    networks:
      - fraud-net

  # ── Prometheus (Metrics Collection) ────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
    networks:
      - fraud-net

  # ── Grafana (Dashboards & Alerting) ────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - fraud-net

networks:
  fraud-net:
    driver: bridge
