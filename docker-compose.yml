# Docker Compose: 5-service local stack.
#
#   ┌────────────────┐   http://api:8000        ┌──────────────────┐
#   │   streamlit    │ ─────────────────────▶   │       api        │
#   │   (dashboard)  │                          │     (FastAPI)    │
#   └────────────────┘                          └────┬─────────────┘
#                                                    │ http://mlflow:5000
#                                                    ▼
#                                              ┌──────────────────┐
#                                              │      mlflow      │
#                                              │ (tracking + reg) │
#                                              └──────────────────┘
#
#   ┌────────────────┐   scrape /metrics        ┌──────────────────┐
#   │   prometheus   │ ◀──────────────────────  │       api        │
#   └─────┬──────────┘                          └──────────────────┘
#         │ datasource
#         ▼
#   ┌────────────────┐
#   │     grafana    │  http://localhost:3000  (admin/admin)
#   └────────────────┘
#
# Guideline (II.D): one container for the API, one for the model server,
# one for monitoring.

services:

  # ── MLflow Tracking + Model Registry (the "model server") ──────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: fraud-mlflow
    # Match the host user so artifacts written by mlflow stay writable
    # by other services that share the ./mlruns bind mount.
    user: "1000:1000"
    ports:
      - "5000:5000"
    volumes:
      # Mount at the host's absolute path so existing runs' artifact_uri
      # (which MLflow stores as absolute paths) resolve inside the container.
      - ./mlruns:${PWD}/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri file://${PWD}/mlruns
      --default-artifact-root file://${PWD}/mlruns
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - fraud-net

  # ── FastAPI Prediction Service ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # Explicit image name so Swarm can find the locally-built image after
    # `docker compose build` (Swarm itself does not build).
    image: fraud-api:local
    container_name: fraud-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_REGISTERED_NAME=fraud-detection-xgboost
      - MLFLOW_MODEL_STAGE=Production
      - MODEL_PATH=models/best_model.joblib
      - FEATURES_PATH=models/feature_names.json
      - SCALER_PATH=data/processed/scaler.joblib
    volumes:
      - ./models:/app/models:ro
      - ./data/processed:/app/data/processed:ro
      - ./data/baselines:/app/data/baselines:ro
      - ./data:/app/data
      # Mount at the host's absolute path so existing runs' artifact_uri
      # (which MLflow stores as absolute paths) resolve inside the container.
      - ./mlruns:${PWD}/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Swarm-mode replicas + restart_policy live in docker-compose.swarm.yml
    # (compose mode would honor deploy.replicas and create port conflicts).
    # Short-form depends_on for Swarm parser compatibility — the api's own
    # healthcheck (with retries) handles the brief mlflow startup race.
    depends_on:
      - mlflow
    networks:
      - fraud-net

  # ── Streamlit Dashboard ────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    image: fraud-api:local   # same image as api; different command
    container_name: fraud-streamlit
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      # URLs the "Pipeline Status" page polls. Uses the compose-network DNS
      # names so the streamlit container can reach each service directly.
      - MLFLOW_URL=http://mlflow:5000
      - AIRFLOW_URL=http://airflow:8080
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://localhost:3000
      - AIRFLOW_USER=admin
      # Read at request time from the same docker secret the airflow service uses.
      - AIRFLOW_PASSWORD_FILE=/run/secrets/airflow_admin_password
    command: >
      streamlit run src/app/streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0
    # Override the Dockerfile's healthcheck (which pings :8000, the API port)
    # since this container only serves Streamlit on :8501.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./data:/app/data:ro
      # Mount the DVC manifests read-only so the Pipeline Status page can
      # render stage status from dvc.lock without needing the DVC binary
      # inside the streamlit image.
      - ./dvc.yaml:/app/dvc.yaml:ro
      - ./dvc.lock:/app/dvc.lock:ro
    secrets:
      - airflow_admin_password
    depends_on:
      - api
    networks:
      - fraud-net

  # ── Node Exporter (Host CPU/RAM/disk/network metrics) ──────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: fraud-node-exporter
    ports:
      - "9100:9100"
    # Mount host filesystems read-only so node_exporter can report on
    # the host, not the container's own (mostly empty) namespace.
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker)($$|/)
    networks:
      - fraud-net

  # ── Airflow (scheduled retraining + scraping DAGs) ─────────────────
  airflow:
    build:
      context: .
      dockerfile: docker/airflow.Dockerfile
    image: fraud-airflow:local
    container_name: fraud-airflow
    ports:
      # Host 8080 is often taken by Jenkins/Tomcat/dev servers; expose on 8090.
      - "8090:8080"
    environment:
      # Standalone mode = webserver + scheduler in one process; SQLite backend.
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      # Use Airflow's default SQLite path ($AIRFLOW_HOME/airflow.db) — the
      # directory is created with airflow-user permissions during image build.
      # DAG run history is ephemeral on `docker compose down`; that's fine
      # for a learning project — DAGs themselves live in ./airflow/dags/.
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      # Airflow 2.x defaults `[api] auth_backends` to `session` only, which
      # rejects basic-auth from non-browser callers. The Streamlit
      # "Pipeline Status" page calls /api/v1/dags with HTTP Basic, so we
      # add the basic_auth backend here. Session auth still works for the
      # web UI; basic_auth is only used by the Streamlit poll.
      AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
      # MLflow tracking URI for retrain DAG (overrides config default)
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PYTHONPATH: /project
    volumes:
      - ./airflow/dags:/opt/airflow/dags:ro
      # Project files the DAGs operate on. Mounted at /project (matched by
      # PYTHONPATH above) and at the same host absolute path for mlruns,
      # so existing artifact_uri values resolve identically inside Airflow.
      - ./scripts:/project/scripts:ro
      - ./src:/project/src:ro
      - ./configs:/project/configs:ro
      - ./models:/project/models
      - ./data:/project/data
      - ./mlruns:${PWD}/mlruns
    # Init DB → create admin user (password from secret) → run scheduler in
    # background → webserver in foreground. We don't use `airflow standalone`
    # because it ignores _AIRFLOW_WWW_USER_* env vars and generates its own
    # random password.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username admin --password "$$(cat /run/secrets/airflow_admin_password)" \
          --firstname Admin --lastname User \
          --role Admin --email admin@fraud.local || true
        airflow scheduler &
        exec airflow webserver
    secrets:
      - airflow_admin_password
    depends_on:
      - mlflow
    networks:
      - fraud-net

  # ── AlertManager (alert routing → Mailtrap SMTP) ────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: fraud-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    secrets:
      - mailtrap_smtp_password
    networks:
      - fraud-net

  # ── Blackbox Exporter (HTTP probes for non-instrumented services) ──
  # Probes MLflow, Airflow, Streamlit, Grafana — services that don't
  # expose Prometheus metrics on their own. Prometheus scrapes the
  # exporter (port 9115), which in turn HTTP-pings each target.
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: fraud-blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./docker/monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    networks:
      - fraud-net

  # ── Prometheus (Metrics Collection) ────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: fraud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    depends_on:
      - api
      - node-exporter
      - alertmanager
      - blackbox-exporter
    networks:
      - fraud-net

  # ── Grafana (Dashboards) ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: fraud-grafana
    ports:
      - "3000:3000"
    environment:
      # Grafana's `__FILE` suffix tells it to read the value from a file path
      # rather than the env var directly. The file is the docker secret.
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    secrets:
      - grafana_admin_password
    depends_on:
      - prometheus
    networks:
      - fraud-net

networks:
  # No explicit driver — compose defaults to `bridge`, `docker stack
  # deploy` defaults to `overlay`. Swarm services cannot run on bridge.
  fraud-net: {}

volumes:
  grafana-data:
  alertmanager-data:

# Docker secrets — file-sourced so the same compose file works in both
# `docker compose up` (file is bind-mounted at /run/secrets/<name>) and
# `docker stack deploy` (file is read once, stored encrypted in Swarm's
# Raft log, then mounted at /run/secrets/<name> on each task).
secrets:
  mailtrap_smtp_password:
    file: ./secrets/mailtrap_smtp_password
  airflow_admin_password:
    file: ./secrets/airflow_admin_password
  grafana_admin_password:
    file: ./secrets/grafana_admin_password
