[pytest]
testpaths = tests
markers =
    network: tests that hit live external URLs (skipped by default; opt in with -m network)
addopts = -m "not network"

# Suppress deprecation noise we don't own. Our own deprecations stay loud.
filterwarnings =
    # mlflow internals still use pkg_resources + Pydantic V1
    ignore:.*pkg_resources is deprecated.*:DeprecationWarning
    ignore:.*Pydantic V1 style.*:DeprecationWarning
    ignore:.*Support for class-based.*config.*is deprecated.*:DeprecationWarning
    ignore::pydantic.PydanticDeprecatedSince20
    # Model registry stages are deprecated; we set aliases too, so we can ignore.
    ignore:.*Model registry stages will be removed.*:FutureWarning
